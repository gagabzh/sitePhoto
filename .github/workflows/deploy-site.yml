name: Deploy — Instance 1 (app)

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'migrations/**'
      - 'Dockerfile'
      - 'package*.json'
      - 'init-db.sql'
      - 'Caddyfile'
      - 'docker-compose.prod.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # Require status checks: the 'test' job must be enabled in branch protection
      # settings so coverage threshold failures block merges.
      - name: Test
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Audit
        run: npm audit --audit-level=high --json | node scripts/audit-check.js

      - name: Audit worker dependencies
        working-directory: worker
        run: |
          npm ci
          npm audit --audit-level=high --json | node ../scripts/audit-check.js

  deploy:
    runs-on: ubuntu-latest
    environment: production
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Instance 1
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.INSTANCE1_HOST }}
          username: ${{ secrets.INSTANCE1_USER }}
          key: ${{ secrets.INSTANCE1_SSH_KEY }}
          script: |
            set -e
            cd ~/sitephoto

            git fetch origin main
            git reset --hard origin/main

            # First deploy only: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d redis
            docker compose -f docker-compose.prod.yml --env-file .env.prod build app
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --no-deps app caddy

            echo "Deploy complete: $(date)"
