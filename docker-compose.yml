services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sitephoto
      POSTGRES_USER: sitephoto
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sitephoto"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://sitephoto:${DB_PASSWORD:-changeme}@db:5432/sitephoto
      SESSION_SECRET: ${SESSION_SECRET:-dev-secret}
      SEED_NAME: ${SEED_NAME:-Saev}
      SEED_EMAIL: ${SEED_EMAIL:-saev.bzh@pm.me}
      SEED_PASS: ${SEED_PASS:-changeme}
      UPLOAD_DIR: /app/uploads
      OLLAMA_HOST: ${OLLAMA_HOST:-host-gateway}
      OLLAMA_PORT: ${OLLAMA_PORT:-11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llava}
      # V4 — queue, storage, inter-service auth
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-devpassword}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: ${S3_BUCKET:-photo-storage}
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      WORKER_API_SECRET: ${WORKER_API_SECRET:-dev-worker-secret}
    extra_hosts:
      - "host-gateway:host-gateway"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-devpassword}
      INSTANCE1_API_URL: http://app:3000
      WORKER_API_SECRET: ${WORKER_API_SECRET:-dev-worker-secret}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: ${S3_BUCKET:-photo-storage}
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      OLLAMA_HOST: ${OLLAMA_HOST:-host-gateway}
      OLLAMA_PORT: ${OLLAMA_PORT:-11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llava}
    extra_hosts:
      - "host-gateway:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-devpassword}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-devpassword}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/photo-storage &&
        echo 'Bucket photo-storage ready'
      "

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  postgres_data:
  minio_data:
  caddy_data:
  caddy_config:
