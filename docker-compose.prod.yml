# Production — Instance-1 (OVH Public Cloud)
# Worker runs separately on Instance-2. No MinIO (uses real OVH Object Storage).
# Copy .env.example to .env.prod, fill in all values, then:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d

services:
  db:
    image: postgres:15-alpine
    restart: always
    env_file: .env.prod
    environment:
      POSTGRES_DB: sitephoto
      POSTGRES_USER: sitephoto
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sitephoto"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: always
    env_file: .env.prod
    environment:
      NODE_ENV: production
      # Override REDIS_HOST from .env.prod: the app container reaches Redis via
      # the Docker bridge network using the service name, not the vRack IP.
      # (The vRack IP is only routable from Instance-2 or the host — not from
      # inside a container on the bridge network.)
      REDIS_HOST: redis
    # Expose the internal API on the vRack IP only (port 3001 → app:3000).
    # Instance-2 POSTs to http://<REDIS_BIND_IP>:3001/internal — never reachable
    # from the public interface. Caddy still proxies to app:3000 internally.
    ports:
      - "${REDIS_BIND_IP}:3001:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: always
    # Redis binds to 0.0.0.0 inside the container (the container has its own
    # network namespace — the vRack IP doesn't exist inside it).
    # Host-level restriction is enforced by the port mapping below:
    # Docker only publishes port 6379 on REDIS_BIND_IP (vRack IP), so it is
    # never reachable from the public interface.
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --bind 0.0.0.0
    ports:
      - "${REDIS_BIND_IP}:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    env_file: .env.prod
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
