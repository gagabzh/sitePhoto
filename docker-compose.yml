services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: sitephoto
      POSTGRES_USER: sitephoto
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sitephoto"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://sitephoto:${DB_PASSWORD:-changeme}@db:5432/sitephoto
      SESSION_SECRET: ${SESSION_SECRET:-dev-secret}
      SEED_NAME: ${SEED_NAME:-Saev}
      SEED_EMAIL: ${SEED_EMAIL:-saev.bzh@pm.me}
      SEED_PASS: ${SEED_PASS:-changeme}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
